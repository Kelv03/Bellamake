<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Bella Make</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Painel de Gestão</h1>
        <a href="index.html" style="color: white; text-decoration: underline; font-size: 14px;">Voltar para a Loja</a>
    </header>

    <main class="admin-container" id="loginScreen">
        <h2>Acesso Restrito</h2>
        <input type="password" id="senhaAdmin" placeholder="Digite a senha">
        <button class="btn-buy" onclick="verificarSenha()">Entrar</button>
    </main>

    <main class="admin-container" id="adminPanel" style="display: none;">
        <h2>Adicionar Novo Produto</h2>
        <form id="formProduto" onsubmit="salvarProduto(event)">
            <input type="text" id="nomeProd" placeholder="Nome do Produto (ex: Base Matte)" required>
            <input type="number" id="precoProd" placeholder="Preço (ex: 45.90)" step="0.01" required>
            
            <select id="catProd" required>
                <option value="">Selecione a Categoria...</option>
                <option value="Rosto">Rosto</option>
                <option value="Olhos">Olhos</option>
                <option value="Boca">Boca</option>
                <option value="Sobrancelha">Sobrancelha</option>
                <option value="Acessórios">Acessórios</option>
            </select>

            <input type="url" id="imgProd" placeholder="Link da Imagem (URL)" required>
            <button type="submit" class="btn-buy">Guardar Produto no Banco</button>
        </form>

        <h2 style="margin-top: 30px;">Produtos Cadastrados</h2>
        <div id="listaAdmin" class="admin-list">A carregar banco de dados...</div>
    </main>

    <script src="script.js"></script>
</body>
</html>
