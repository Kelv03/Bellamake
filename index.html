<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella Make - Loja Oficial</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Carrinho agora está BRANCO e com tamanho ajustado para dar contraste! */
        .carrinho-btn { background: none; border: none; color: #ffffff; font-size: 28px; cursor: pointer; position: relative; margin-left: 15px;}
        .badge { background: #ffc107; color: black; border-radius: 50%; padding: 2px 6px; font-size: 14px; position: absolute; top: -10px; right: -12px; font-weight: bold;}
        .search-bar { display: flex; align-items: center; }
        
        /* Modais */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-conteudo { background: white; padding: 20px; border-radius: 10px; max-width: 400px; width: 90%; max-height: 90vh; overflow-y: auto; position: relative;}
        .fechar { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #888; }
        .btn-rosa { background-color: #d63384; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px;}
        .btn-rosa:hover { background-color: #c02673; }
        .modal-conteudo input, .modal-conteudo select { width: 100%; padding: 8px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;}
        .carrinho-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; align-items: center;}
        .btn-remover { background: #dc3545; color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <header style="background-color: #d63384; padding: 15px 20px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div class="logo-container" style="text-align: center; margin-bottom: 15px;">
            <h1 style="margin: 0; font-size: 32px; color: white;"> Bella Make</h1>
            <p style="margin: 0; font-size: 14px; color: white;">Realce a sua beleza</p>
        </div>
        
        <div style="display: flex; align-items: center; background: white; border-radius: 25px; padding: 5px 20px; width: 100%; max-width: 600px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <input type="text" id="searchInput" placeholder="Procurar produto..." onkeyup="filtrarNaTela()" style="border: none; outline: none; flex: 1; padding: 8px; font-size: 16px;">
            <i class="fas fa-search" style="color: #d63384; font-size: 18px; margin-right: 10px;"></i>
            
            <div style="height: 30px; width: 1px; background-color: #ccc; margin: 0 15px;"></div>
            
            <button class="carrinho-btn" onclick="abrirModalCarrinho()" style="background: none; border: none; color: #d63384; font-size: 24px; cursor: pointer; position: relative;">
                <i class="fas fa-shopping-cart"></i>
                <span class="badge" id="contador-carrinho" style="background: #ffc107; color: black; border-radius: 50%; padding: 2px 6px; font-size: 12px; position: absolute; top: -8px; right: -12px; font-weight: bold;">0</span>
            </button>
        </div>
    </header>

    <nav class="categories">
        <button class="cat-btn active" onclick="filtrarCategoria('Todos')">Todos</button>
        <button class="cat-btn" style="background-color: #ffc107; color: black; font-weight: bold;" onclick="filtrarCategoria('Promoções')"><i class="fas fa-tag"></i> Promoções</button>
        <button class="cat-btn" onclick="filtrarCategoria('Rosto')">Rosto</button>
        <button class="cat-btn" onclick="filtrarCategoria('Olhos')">Olhos</button>
        <button class="cat-btn" onclick="filtrarCategoria('Boca')">Boca</button>
        <button class="cat-btn" onclick="filtrarCategoria('Sobrancelha')">Sobrancelha</button>
        <button class="cat-btn" onclick="filtrarCategoria('Acessórios')">Acessórios</button>
    </nav>

    <main>
        <div class="product-grid" id="productGrid">
            <p style="text-align: center; grid-column: 1/-1;">A carregar produtos...</p>
        </div>
    </main>

    <div id="modal-produto" class="modal">
        <div class="modal-conteudo">
            <span class="fechar" onclick="fecharModal('modal-produto')">&times;</span>
            <img id="detalhe-imagem" src="" style="width: 100%; height: 250px; object-fit: cover; border-radius: 8px;">
            <h2 id="detalhe-nome" style="color: #d63384; margin-bottom: 5px;"></h2>
            <p id="detalhe-categoria" style="color: #666; margin-top: 0;"></p>
            
            <div id="detalhe-preco"></div>
            
            <p style="color: #28a745; font-size: 14px; margin-top: 10px;">Estoque disponível: <b id="detalhe-estoque"></b></p>
            
            <div id="area-cores" style="display: none;">
                <label>Escolha a Cor:</label>
                <select id="detalhe-cor"></select>
            </div>
            
            <label>Quantidade:</label>
            <input type="number" id="detalhe-qtd" value="1" min="1">
            
            <button class="btn-rosa" onclick="adicionarAoCarrinho()">Adicionar ao Carrinho</button>
        </div>
    </div>

    <div id="modal-carrinho" class="modal">
        <div class="modal-conteudo">
            <span class="fechar" onclick="fecharModal('modal-carrinho')">&times;</span>
            <h2 style="color: #d63384;"><i class="fas fa-shopping-cart"></i> Seu Carrinho</h2>
            
            <div id="lista-carrinho"></div>
            
            <hr>
            <label>Selecione a Cidade (Frete/Retirada):</label>
            <select id="select-frete" onchange="calcularTotal()"></select>
            
            <h3 style="text-align: right; color: #333;">Subtotal: R$ <span id="carrinho-subtotal">0.00</span></h3>
            <h3 style="text-align: right; color: #d63384;">Total Final: R$ <span id="carrinho-total">0.00</span></h3>
            
            <button class="btn-rosa" onclick="finalizarCompra()">
                <i class="fab fa-whatsapp"></i> Finalizar Pedido
            </button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Bella Make. Desenvolvido por Breno Rezende.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
